<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FROTO - Teknik Analiz</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body { margin: 0; padding: 20px; background: #f5f5f5; font-family: 'Segoe UI', Arial, sans-serif; }
        .chart-container { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin: 0 0 20px 0; color: #1a1a1a; font-size: 24px; }
    </style>
</head>
<body>
    <div class="chart-container">
        <h2>📊 FROTO - Teknik Analiz Grafiği</h2>
        <div id="chart" style="width:100%; height:800px;"></div>
    </div>
    <script>
        // Data preparation (daily aggregated)
        var dates = ['2026-03-13', '2026-03-16', '2026-03-17', '2026-03-18', '2026-03-19', '2026-03-23', '2026-03-24', '2026-03-25', '2026-03-26', '2026-03-27', '2026-03-30', '2026-03-31', '2026-04-01', '2026-04-02', '2026-04-03', '2026-04-06', '2026-04-07', '2026-04-08', '2026-04-09', '2026-04-10']

        var prices = [109.80, 106.00, 107.80, 105.90, 109.80, 108.50, 105.20, 105.10, 103.50, 103.50, 100.40, 101.30, 102.50, 100.70, 99.70, 100.40, 96.75, 101.80, 101.70, 105.30];

        var opens = [108.80, 108.30, 107.10, 108.90, 105.40, 107.60, 107.00, 106.00, 104.60, 103.10, 103.00, 100.30, 103.50, 101.00, 100.90, 99.60, 100.10, 101.50, 101.10, 103.00];

        var highs = [110.20, 108.30, 108.20, 109.40, 109.80, 108.60, 107.20, 106.90, 105.40, 103.90, 103.30, 102.80, 103.90, 101.40, 101.40, 101.00, 100.50, 102.90, 102.80, 105.30];

        var lows = [108.10, 104.80, 104.90, 105.60, 104.50, 102.00, 104.80, 104.90, 103.20, 102.00, 100.10, 99.25, 101.80, 100.00, 99.65, 99.40, 96.55, 100.50, 100.80, 102.30];

        var volumes = [4721330, 6163068, 7690243, 8043954, 5776847, 18993130, 7786422, 8542571, 5586684, 4857735, 7683542, 13992760, 6085975, 7662681, 6621229, 6666421, 13456904, 18901830, 14941059, 15678747];

        var dailyChanges = [0.92, -3.46, 1.70, -1.76, 3.68, -1.18, -3.04, -0.10, -1.52, 0.00, -3.00, 0.90, 1.18, -1.76, -0.99, 0.70, -3.64, 5.22, -0.10, 3.54];

        var closingTimes = ['16:30', '16:30', '16:30', '16:30', '12:30', '16:30', '16:30', '16:30', '16:30', '16:30', '17:30', '17:30', '17:30', '17:30', '17:30', '17:30', '17:30', '17:30', '17:30', '18:00'];

        var signalTypes = ['', 'SAT (Skor: -8, 2 gösterge)', '', '', 'Güçlü AL (Skor: 8, 3 gösterge)', '', '', '', 'SAT (Skor: -5, 2 gösterge)', '', 'Güçlü SAT (Skor: -12, 5 gösterge)', 'SAT (Skor: -6, 2 gösterge)', '', '', 'Güçlü SAT (Skor: -10, 4 gösterge)', '', 'Güçlü SAT (Skor: -12, 4 gösterge)', '', 'AL (Skor: 4, 3 gösterge)', 'Güçlü AL (Skor: 12, 4 gösterge)'];

        var dayNames = ['Cuma', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma'];

        var sma20 = [110.86, 108.38, 106.63, 106.68, 106.99, 106.49, 105.80, 105.96, 104.90, 103.91, 102.61, 101.37, 101.36, 101.53, 100.66, 100.39, 99.39, 100.09, 101.29, 102.76];

        var sma50 = [110.00, 109.37, 109.27, 108.90, 108.52, 107.46, 106.53, 106.10, 105.84, 105.19, 104.31, 103.35, 102.78, 101.90, 101.34, 100.91, 100.45, 100.50, 100.51, 101.16];

        var ema12 = [109.90, 106.72, 106.71, 107.01, 107.18, 106.16, 105.73, 105.62, 104.31, 103.34, 102.04, 100.93, 102.13, 100.86, 100.34, 100.40, 98.41, 101.14, 101.66, 103.68];

        var rsi = [46.55, 36.22, 51.99, 39.59, 63.19, 55.93, 46.07, 45.12, 37.45, 44.25, 25.35, 45.83, 52.91, 44.00, 37.40, 47.21, 22.19, 58.80, 54.41, 71.61];

        // BUY/SELL signals (4 types)
        var alDates = [], alPrices = [], alTexts = [];
        var strongAlDates = [], strongAlPrices = [], strongAlTexts = [];
        var satDates = [], satPrices = [], satTexts = [];
        var strongSatDates = [], strongSatPrices = [], strongSatTexts = [];
        satDates.push('2026-03-16');
        satPrices.push(106.00);
        satTexts.push('<b>Tarih: 2026-03-16 (Pazartesi)</b><br>Açılış: 108.30 TL<br>Kapanış: 106.00 TL<br>Günlük Değişim: -3.46%<br>Kapanış Saati: 16:30<br>Sinyal: SAT (Skor: -8, 2 gösterge)');
        strongAlDates.push('2026-03-19');
        strongAlPrices.push(109.80);
        strongAlTexts.push('<b>Tarih: 2026-03-19 (Perşembe)</b><br>Açılış: 105.40 TL<br>Kapanış: 109.80 TL<br>Günlük Değişim: 3.68%<br>Kapanış Saati: 12:30<br>Sinyal: Güçlü AL (Skor: 8, 3 gösterge)');
        satDates.push('2026-03-26');
        satPrices.push(103.50);
        satTexts.push('<b>Tarih: 2026-03-26 (Perşembe)</b><br>Açılış: 104.60 TL<br>Kapanış: 103.50 TL<br>Günlük Değişim: -1.52%<br>Kapanış Saati: 16:30<br>Sinyal: SAT (Skor: -5, 2 gösterge)');
        strongSatDates.push('2026-03-30');
        strongSatPrices.push(100.40);
        strongSatTexts.push('<b>Tarih: 2026-03-30 (Pazartesi)</b><br>Açılış: 103.00 TL<br>Kapanış: 100.40 TL<br>Günlük Değişim: -3.00%<br>Kapanış Saati: 17:30<br>Sinyal: Güçlü SAT (Skor: -12, 5 gösterge)');
        satDates.push('2026-03-31');
        satPrices.push(101.30);
        satTexts.push('<b>Tarih: 2026-03-31 (Salı)</b><br>Açılış: 100.30 TL<br>Kapanış: 101.30 TL<br>Günlük Değişim: 0.90%<br>Kapanış Saati: 17:30<br>Sinyal: SAT (Skor: -6, 2 gösterge)');
        strongSatDates.push('2026-04-03');
        strongSatPrices.push(99.70);
        strongSatTexts.push('<b>Tarih: 2026-04-03 (Cuma)</b><br>Açılış: 100.90 TL<br>Kapanış: 99.70 TL<br>Günlük Değişim: -0.99%<br>Kapanış Saati: 17:30<br>Sinyal: Güçlü SAT (Skor: -10, 4 gösterge)');
        strongSatDates.push('2026-04-07');
        strongSatPrices.push(96.75);
        strongSatTexts.push('<b>Tarih: 2026-04-07 (Salı)</b><br>Açılış: 100.10 TL<br>Kapanış: 96.75 TL<br>Günlük Değişim: -3.64%<br>Kapanış Saati: 17:30<br>Sinyal: Güçlü SAT (Skor: -12, 4 gösterge)');
        alDates.push('2026-04-09');
        alPrices.push(101.70);
        alTexts.push('<b>Tarih: 2026-04-09 (Perşembe)</b><br>Açılış: 101.10 TL<br>Kapanış: 101.70 TL<br>Günlük Değişim: -0.10%<br>Kapanış Saati: 17:30<br>Sinyal: AL (Skor: 4, 3 gösterge)');
        strongAlDates.push('2026-04-10');
        strongAlPrices.push(105.30);
        strongAlTexts.push('<b>Tarih: 2026-04-10 (Cuma)</b><br>Açılış: 103.00 TL<br>Kapanış: 105.30 TL<br>Günlük Değişim: 3.54%<br>Kapanış Saati: 18:00<br>Sinyal: Güçlü AL (Skor: 12, 4 gösterge)');

        // Build custom data for hover template
        var customdata = [];
        for (let i = 0; i < dates.length; i++) {
            customdata.push([opens[i], dailyChanges[i], closingTimes[i], signalTypes[i], dayNames[i], volumes[i]]);
        }

        // Price chart traces
        var tracePrice = {
            x: dates,
            y: prices,
            customdata: customdata,
            type: 'scatter',
            mode: 'lines',
            name: 'Kapanış Fiyatı',
            line: { color: '#1a1a1a', width: 2 },
            hovertemplate: '<b>Tarih: %{x} (%{customdata[4]})</b><br>Açılış: %{customdata[0]:.2f} TL<br>Kapanış: %{y:.2f} TL<br>Günlük Değişim: %{customdata[1]:.2f}%<br>Kapanış Saati: %{customdata[2]}<br>Günlük Hacim: %{customdata[5]:,.0f}<br>Sinyal: %{customdata[3]}<extra></extra>',
            yaxis: 'y'
        };

        var traceSMA20 = {
            x: dates,
            y: sma20,
            type: 'scatter',
            mode: 'lines',
            name: 'SMA20',
            line: { color: '#4285F4', width: 1.5, dash: 'dot' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>SMA20: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceSMA50 = {
            x: dates,
            y: sma50,
            type: 'scatter',
            mode: 'lines',
            name: 'SMA50',
            line: { color: '#FBBC05', width: 1.5, dash: 'dot' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>SMA50: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceEMA12 = {
            x: dates,
            y: ema12,
            type: 'scatter',
            mode: 'lines',
            name: 'EMA12',
            line: { color: '#34D399', width: 1.5, dash: 'dash' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>EMA12: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceAlSignals = {
            x: alDates,
            y: alPrices,
            text: alTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'AL Sinyali',
            marker: { color: '#4ADE80', size: 12, symbol: 'triangle-up', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceStrongAlSignals = {
            x: strongAlDates,
            y: strongAlPrices,
            text: strongAlTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'GÜÇLÜ AL Sinyali',
            marker: { color: '#15803D', size: 13, symbol: 'triangle-up', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceSatSignals = {
            x: satDates,
            y: satPrices,
            text: satTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'SAT Sinyali',
            marker: { color: '#FB7185', size: 12, symbol: 'triangle-down', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceStrongSatSignals = {
            x: strongSatDates,
            y: strongSatPrices,
            text: strongSatTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'GÜÇLÜ SAT Sinyali',
            marker: { color: '#991B1B', size: 13, symbol: 'triangle-down', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        // RSI chart trace (hidden)
        var traceRSI = {
            x: dates,
            y: rsi,
            type: 'scatter',
            mode: 'lines',
            name: 'RSI(14)',
            line: { color: '#A855F7', width: 2 },
            hovertemplate: '<b>%{x}</b><br>RSI: %{y:.1f}<extra></extra>',
            visible: false,
            showlegend: false,
            yaxis: 'y2',
            xaxis: 'x'
        };

        var traceVolume = {
            x: dates,
            y: volumes,
            type: 'bar',
            mode: 'markers',
            name: 'Hacim',
            marker: { color: 'rgba(68, 85, 102, 0.5)' },
            hovertemplate: '<b>Tarih: %{x|%Y-%m-%d}</b><br>Hacim: %{y:,.0f}<extra></extra>',
            visible: true,
            yaxis: 'y2',
            xaxis: 'x'
        };

        var traceRSI70 = {
            x: dates,
            y: Array(dates.length).fill(70),
            type: 'scatter',
            mode: 'lines',
            name: 'RSI 70 (Aşırı Alım)',
            line: { color: '#EF4444', width: 1, dash: 'dash' },
            visible: false,
            showlegend: false,
            hoverinfo: 'skip',
            yaxis: 'y2',
            xaxis: 'x'
        };

        var traceRSI30 = {
            x: dates,
            y: Array(dates.length).fill(30),
            type: 'scatter',
            mode: 'lines',
            name: 'RSI 30 (Aşırı Satış)',
            line: { color: '#22C55E', width: 1, dash: 'dash' },
            visible: false,
            showlegend: false,
            hoverinfo: 'skip',
            yaxis: 'y2',
            xaxis: 'x'
        };

        // Layout configuration
        var layout = {
            title: {
                text: 'FROTO - Teknik Analiz',
                font: { size: 18, color: '#1a1a1a' }
            },
            xaxis: {
                title: 'Tarih',
                type: 'date',
                tickformat: '%Y-%m',
                nticks: 12,
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            yaxis: {
                title: 'Fiyat (₺)',
                domain: [0.3, 1],
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            yaxis2: {
                title: 'Hacim',
                domain: [0, 0.25],
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            hovermode: 'closest',
            plot_bgcolor: '#fafafa',
            paper_bgcolor: '#ffffff',
            font: { family: 'Segoe UI, Arial', size: 12 },
            legend: {
                x: 0,
                y: 1.1,
                orientation: 'h',
                bgcolor: 'rgba(255,255,255,0.9)',
                bordercolor: '#e5e5e5',
                borderwidth: 1
            },
            margin: { t: 100, b: 80, l: 80, r: 50 }
        };

        var config = {
            responsive: true,
            displayModeBar: true,
            displaylogo: false,
            modeBarButtonsToRemove: ['toImage', 'sendDataToCloud'],
            locale: 'tr'
        };

        // Render chart
        var data = [tracePrice, traceSMA20, traceSMA50, traceEMA12, traceAlSignals, traceStrongAlSignals, traceSatSignals, traceStrongSatSignals, traceVolume, traceRSI, traceRSI70, traceRSI30];
        Plotly.newPlot('chart', data, layout, config);
    </script>
</body>
</html>
