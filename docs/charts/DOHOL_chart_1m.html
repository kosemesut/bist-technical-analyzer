<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOHOL - Teknik Analiz</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body { margin: 0; padding: 20px; background: #f5f5f5; font-family: 'Segoe UI', Arial, sans-serif; }
        .chart-container { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin: 0 0 20px 0; color: #1a1a1a; font-size: 24px; }
    </style>
</head>
<body>
    <div class="chart-container">
        <h2>📊 DOHOL - Teknik Analiz Grafiği</h2>
        <div id="chart" style="width:100%; height:800px;"></div>
    </div>
    <script>
        // Data preparation (daily aggregated)
        var dates = ['2026-03-09', '2026-03-10', '2026-03-11', '2026-03-12', '2026-03-13', '2026-03-16', '2026-03-17', '2026-03-18', '2026-03-19', '2026-03-23', '2026-03-24', '2026-03-25', '2026-03-26', '2026-03-27', '2026-03-30', '2026-03-31', '2026-04-01', '2026-04-02', '2026-04-03']

        var prices = [19.93, 21.48, 21.50, 21.18, 21.30, 21.02, 21.02, 20.86, 20.90, 20.86, 20.60, 21.14, 20.70, 21.04, 20.46, 20.04, 20.58, 19.80, 19.46];

        var opens = [19.40, 20.52, 21.36, 21.38, 21.02, 21.22, 21.08, 21.08, 20.94, 20.18, 20.60, 21.00, 21.00, 20.74, 21.00, 20.42, 20.38, 21.42, 19.85];

        var highs = [20.18, 21.56, 21.70, 21.74, 21.62, 21.32, 21.22, 21.52, 21.06, 20.86, 20.88, 21.18, 21.22, 21.18, 21.36, 20.78, 20.84, 21.44, 19.93];

        var lows = [19.01, 20.32, 21.30, 21.12, 20.80, 20.78, 20.86, 20.84, 20.76, 19.75, 20.42, 20.86, 20.68, 20.66, 20.32, 19.92, 20.18, 19.79, 19.43];

        var volumes = [8113717, 11923463, 7853413, 5898831, 10680701, 7080682, 3861134, 4829131, 1911598, 9705201, 3664280, 3160661, 3668130, 8922532, 8973092, 12020761, 9893905, 37098338, 7553195];

        var dailyChanges = [1.74, 7.78, 0.09, -1.49, 0.57, -1.31, 0.00, -0.76, 0.19, -0.19, -1.25, 2.62, -2.08, 1.64, -2.76, -2.05, 2.69, -3.79, -1.72];

        var closingTimes = ['16:30', '16:30', '16:30', '16:30', '16:30', '16:30', '16:30', '16:30', '12:30', '16:30', '16:30', '16:30', '16:30', '16:30', '17:30', '17:30', '17:30', '17:30', '18:00'];

        var signalTypes = ['', 'Güçlü AL (Skor: 12, 4 gösterge)', 'AL (Skor: 5, 5 gösterge)', '', '', '', '', '', 'SAT (Skor: -5, 2 gösterge)', '', '', 'Güçlü AL (Skor: 7, 3 gösterge)', 'SAT (Skor: -4, 4 gösterge)', '', '', 'SAT (Skor: -6, 2 gösterge)', '', 'SAT (Skor: -5, 2 gösterge)', 'Güçlü SAT (Skor: -8, 3 gösterge)'];

        var dayNames = ['Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma'];

        var sma20 = [19.78, 20.15, 20.95, 21.41, 21.39, 21.19, 21.03, 21.02, 21.02, 20.80, 20.62, 20.80, 20.92, 20.98, 20.90, 20.58, 20.39, 20.40, 19.99];

        var sma50 = [19.73, 19.96, 20.24, 20.52, 20.73, 20.89, 21.13, 21.21, 21.17, 21.00, 20.89, 20.85, 20.85, 20.84, 20.81, 20.76, 20.75, 20.61, 20.36];

        var ema12 = [19.75, 20.72, 21.27, 21.37, 21.35, 21.04, 20.99, 21.03, 20.99, 20.64, 20.65, 20.94, 20.89, 20.97, 20.81, 20.30, 20.55, 20.25, 19.72];

        var rsi = [53.53, 73.46, 70.72, 52.36, 52.72, 48.15, 49.57, 42.94, 44.89, 52.05, 46.85, 59.50, 42.95, 54.39, 35.59, 35.83, 50.38, 29.24, 25.10];

        // BUY/SELL signals (4 types)
        var alDates = [], alPrices = [], alTexts = [];
        var strongAlDates = [], strongAlPrices = [], strongAlTexts = [];
        var satDates = [], satPrices = [], satTexts = [];
        var strongSatDates = [], strongSatPrices = [], strongSatTexts = [];
        strongAlDates.push('2026-03-10');
        strongAlPrices.push(21.48);
        strongAlTexts.push('<b>Tarih: 2026-03-10 (Salı)</b><br>Açılış: 20.52 TL<br>Kapanış: 21.48 TL<br>Günlük Değişim: 7.78%<br>Kapanış Saati: 16:30<br>Sinyal: Güçlü AL (Skor: 12, 4 gösterge)');
        alDates.push('2026-03-11');
        alPrices.push(21.50);
        alTexts.push('<b>Tarih: 2026-03-11 (Çarşamba)</b><br>Açılış: 21.36 TL<br>Kapanış: 21.50 TL<br>Günlük Değişim: 0.09%<br>Kapanış Saati: 16:30<br>Sinyal: AL (Skor: 5, 5 gösterge)');
        satDates.push('2026-03-19');
        satPrices.push(20.90);
        satTexts.push('<b>Tarih: 2026-03-19 (Perşembe)</b><br>Açılış: 20.94 TL<br>Kapanış: 20.90 TL<br>Günlük Değişim: 0.19%<br>Kapanış Saati: 12:30<br>Sinyal: SAT (Skor: -5, 2 gösterge)');
        strongAlDates.push('2026-03-25');
        strongAlPrices.push(21.14);
        strongAlTexts.push('<b>Tarih: 2026-03-25 (Çarşamba)</b><br>Açılış: 21.00 TL<br>Kapanış: 21.14 TL<br>Günlük Değişim: 2.62%<br>Kapanış Saati: 16:30<br>Sinyal: Güçlü AL (Skor: 7, 3 gösterge)');
        satDates.push('2026-03-26');
        satPrices.push(20.70);
        satTexts.push('<b>Tarih: 2026-03-26 (Perşembe)</b><br>Açılış: 21.00 TL<br>Kapanış: 20.70 TL<br>Günlük Değişim: -2.08%<br>Kapanış Saati: 16:30<br>Sinyal: SAT (Skor: -4, 4 gösterge)');
        satDates.push('2026-03-31');
        satPrices.push(20.04);
        satTexts.push('<b>Tarih: 2026-03-31 (Salı)</b><br>Açılış: 20.42 TL<br>Kapanış: 20.04 TL<br>Günlük Değişim: -2.05%<br>Kapanış Saati: 17:30<br>Sinyal: SAT (Skor: -6, 2 gösterge)');
        satDates.push('2026-04-02');
        satPrices.push(19.80);
        satTexts.push('<b>Tarih: 2026-04-02 (Perşembe)</b><br>Açılış: 21.42 TL<br>Kapanış: 19.80 TL<br>Günlük Değişim: -3.79%<br>Kapanış Saati: 17:30<br>Sinyal: SAT (Skor: -5, 2 gösterge)');
        strongSatDates.push('2026-04-03');
        strongSatPrices.push(19.46);
        strongSatTexts.push('<b>Tarih: 2026-04-03 (Cuma)</b><br>Açılış: 19.85 TL<br>Kapanış: 19.46 TL<br>Günlük Değişim: -1.72%<br>Kapanış Saati: 18:00<br>Sinyal: Güçlü SAT (Skor: -8, 3 gösterge)');

        // Build custom data for hover template
        var customdata = [];
        for (let i = 0; i < dates.length; i++) {
            customdata.push([opens[i], dailyChanges[i], closingTimes[i], signalTypes[i], dayNames[i], volumes[i]]);
        }

        // Price chart traces
        var tracePrice = {
            x: dates,
            y: prices,
            customdata: customdata,
            type: 'scatter',
            mode: 'lines',
            name: 'Kapanış Fiyatı',
            line: { color: '#1a1a1a', width: 2 },
            hovertemplate: '<b>Tarih: %{x} (%{customdata[4]})</b><br>Açılış: %{customdata[0]:.2f} TL<br>Kapanış: %{y:.2f} TL<br>Günlük Değişim: %{customdata[1]:.2f}%<br>Kapanış Saati: %{customdata[2]}<br>Günlük Hacim: %{customdata[5]:,.0f}<br>Sinyal: %{customdata[3]}<extra></extra>',
            yaxis: 'y'
        };

        var traceSMA20 = {
            x: dates,
            y: sma20,
            type: 'scatter',
            mode: 'lines',
            name: 'SMA20',
            line: { color: '#4285F4', width: 1.5, dash: 'dot' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>SMA20: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceSMA50 = {
            x: dates,
            y: sma50,
            type: 'scatter',
            mode: 'lines',
            name: 'SMA50',
            line: { color: '#FBBC05', width: 1.5, dash: 'dot' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>SMA50: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceEMA12 = {
            x: dates,
            y: ema12,
            type: 'scatter',
            mode: 'lines',
            name: 'EMA12',
            line: { color: '#34D399', width: 1.5, dash: 'dash' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>EMA12: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceAlSignals = {
            x: alDates,
            y: alPrices,
            text: alTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'AL Sinyali',
            marker: { color: '#4ADE80', size: 12, symbol: 'triangle-up', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceStrongAlSignals = {
            x: strongAlDates,
            y: strongAlPrices,
            text: strongAlTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'GÜÇLÜ AL Sinyali',
            marker: { color: '#15803D', size: 13, symbol: 'triangle-up', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceSatSignals = {
            x: satDates,
            y: satPrices,
            text: satTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'SAT Sinyali',
            marker: { color: '#FB7185', size: 12, symbol: 'triangle-down', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceStrongSatSignals = {
            x: strongSatDates,
            y: strongSatPrices,
            text: strongSatTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'GÜÇLÜ SAT Sinyali',
            marker: { color: '#991B1B', size: 13, symbol: 'triangle-down', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        // RSI chart trace (hidden)
        var traceRSI = {
            x: dates,
            y: rsi,
            type: 'scatter',
            mode: 'lines',
            name: 'RSI(14)',
            line: { color: '#A855F7', width: 2 },
            hovertemplate: '<b>%{x}</b><br>RSI: %{y:.1f}<extra></extra>',
            visible: false,
            showlegend: false,
            yaxis: 'y2',
            xaxis: 'x'
        };

        var traceVolume = {
            x: dates,
            y: volumes,
            type: 'bar',
            mode: 'markers',
            name: 'Hacim',
            marker: { color: 'rgba(68, 85, 102, 0.5)' },
            hovertemplate: '<b>Tarih: %{x|%Y-%m-%d}</b><br>Hacim: %{y:,.0f}<extra></extra>',
            visible: true,
            yaxis: 'y2',
            xaxis: 'x'
        };

        var traceRSI70 = {
            x: dates,
            y: Array(dates.length).fill(70),
            type: 'scatter',
            mode: 'lines',
            name: 'RSI 70 (Aşırı Alım)',
            line: { color: '#EF4444', width: 1, dash: 'dash' },
            visible: false,
            showlegend: false,
            hoverinfo: 'skip',
            yaxis: 'y2',
            xaxis: 'x'
        };

        var traceRSI30 = {
            x: dates,
            y: Array(dates.length).fill(30),
            type: 'scatter',
            mode: 'lines',
            name: 'RSI 30 (Aşırı Satış)',
            line: { color: '#22C55E', width: 1, dash: 'dash' },
            visible: false,
            showlegend: false,
            hoverinfo: 'skip',
            yaxis: 'y2',
            xaxis: 'x'
        };

        // Layout configuration
        var layout = {
            title: {
                text: 'DOHOL - Teknik Analiz',
                font: { size: 18, color: '#1a1a1a' }
            },
            xaxis: {
                title: 'Tarih',
                type: 'date',
                tickformat: '%Y-%m',
                nticks: 12,
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            yaxis: {
                title: 'Fiyat (₺)',
                domain: [0.3, 1],
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            yaxis2: {
                title: 'Hacim',
                domain: [0, 0.25],
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            hovermode: 'closest',
            plot_bgcolor: '#fafafa',
            paper_bgcolor: '#ffffff',
            font: { family: 'Segoe UI, Arial', size: 12 },
            legend: {
                x: 0,
                y: 1.1,
                orientation: 'h',
                bgcolor: 'rgba(255,255,255,0.9)',
                bordercolor: '#e5e5e5',
                borderwidth: 1
            },
            margin: { t: 100, b: 80, l: 80, r: 50 }
        };

        var config = {
            responsive: true,
            displayModeBar: true,
            displaylogo: false,
            modeBarButtonsToRemove: ['toImage', 'sendDataToCloud'],
            locale: 'tr'
        };

        // Render chart
        var data = [tracePrice, traceSMA20, traceSMA50, traceEMA12, traceAlSignals, traceStrongAlSignals, traceSatSignals, traceStrongSatSignals, traceVolume, traceRSI, traceRSI70, traceRSI30];
        Plotly.newPlot('chart', data, layout, config);
    </script>
</body>
</html>
