        strongAlDates.push('2026-03-10');

        alPrices.push(12.35);

            yaxis: 'y'
        };

        var traceSMA20 = {
            x: dates,
            y: sma20,
            type: 'scatter',
            mode: 'lines',
            name: 'SMA20',
            line: { color: '#4285F4', width: 1.5, dash: 'dot' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>SMA20: %{y:.2f} TL<extra></extra>',

            yaxis: 'y'
        };

            x: alDates,
            y: alPrices,
            text: alTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'AL Sinyali',
            marker: { color: '#4ADE80', size: 12, symbol: 'triangle-up', line: { color: '#fff', width: 2 } },

            text: strongAlTexts,
            type: 'scatter',
            mode: 'markers',

            hovertemplate: '%{text}<extra></extra>',

        };

                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            yaxis2: {

                domain: [0, 0.25],
