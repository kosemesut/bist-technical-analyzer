            yaxis: 'y'

            type: 'scatter',

            name: 'SMA20',
            line: { color: '#4285F4', width: 1.5, dash: 'dot' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>SMA20: %{y:.2f} TL<extra></extra>',

            yaxis: 'y'
        };

            y: alPrices,
            text: alTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'AL Sinyali',
