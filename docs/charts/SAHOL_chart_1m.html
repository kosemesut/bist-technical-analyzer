<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHOL - Teknik Analiz</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body { margin: 0; padding: 20px; background: #f5f5f5; font-family: 'Segoe UI', Arial, sans-serif; }
        .chart-container { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin: 0 0 20px 0; color: #1a1a1a; font-size: 24px; }

</head>

        var signalTypes = ['Güçlü SAT (Skor: -12, 4 gösterge)', 'SAT (Skor: -8, 2 gösterge)', '', '', '', '', '', 'Güçlü AL (Skor: 7, 3 gösterge)', 'SAT (Skor: -5, 4 gösterge)', 'Güçlü SAT (Skor: -8, 3 gösterge)', '', '', 'SAT (Skor: -6, 2 gösterge)', '', 'Güçlü SAT (Skor: -8, 3 gösterge)', 'SAT (Skor: -6, 2 gösterge)', '', 'Güçlü AL (Skor: 7, 3 gösterge)', '', ''];

        var sma20 = [92.88, 90.71, 91.43, 93.85, 95.48, 95.04, 94.33, 94.23, 94.49, 94.27, 92.42, 91.12, 91.72, 90.89, 90.15, 89.26, 89.35, 89.92, 89.95, 89.60];

        var sma50 = [95.69, 93.17, 92.76, 92.74, 93.33, 93.30, 93.53, 94.52, 94.71, 94.52, 93.70, 93.04, 92.66, 92.08, 91.17, 90.32, 90.21, 90.02, 89.65, 89.57];

        var ema12 = [91.88, 89.68, 93.51, 94.61, 95.71, 94.55, 93.96, 94.62, 94.40, 93.55, 91.52, 91.16, 91.62, 90.50, 89.43, 89.24, 89.54, 90.20, 89.75, 89.37];

        var rsi = [28.10, 42.00, 60.49, 58.27, 54.22, 52.35, 50.89, 61.68, 39.79, 36.76, 54.04, 41.04, 47.41, 43.73, 38.03, 42.32, 49.20, 57.79, 53.43, 42.15];

        // BUY/SELL signals (4 types)
        var alDates = [], alPrices = [], alTexts = [];
        var strongAlDates = [], strongAlPrices = [], strongAlTexts = [];
        var satDates = [], satPrices = [], satTexts = [];
        var strongSatDates = [], strongSatPrices = [], strongSatTexts = [];
        strongSatDates.push('2026-03-06');
        strongSatPrices.push(90.05);
        strongSatTexts.push('<b>Tarih: 2026-03-06 (Cuma)</b><br>Açılış: 91.15 TL<br>Kapanış: 90.05 TL<br>Günlük Değişim: -1.26%<br>Kapanış Saati: 16:30<br>Sinyal: Güçlü SAT (Skor: -12, 4 gösterge)');
        satDates.push('2026-03-09');
        satPrices.push(89.70);
        satTexts.push('<b>Tarih: 2026-03-09 (Pazartesi)</b><br>Açılış: 87.00 TL<br>Kapanış: 89.70 TL<br>Günlük Değişim: -0.39%<br>Kapanış Saati: 16:30<br>Sinyal: SAT (Skor: -8, 2 gösterge)');
        strongAlDates.push('2026-03-17');
        strongAlPrices.push(95.90);
        strongAlTexts.push('<b>Tarih: 2026-03-17 (Salı)</b><br>Açılış: 94.50 TL<br>Kapanış: 95.90 TL<br>Günlük Değişim: 1.75%<br>Kapanış Saati: 16:30<br>Sinyal: Güçlü AL (Skor: 7, 3 gösterge)');
        satDates.push('2026-03-18');
        satPrices.push(93.25);
        satTexts.push('<b>Tarih: 2026-03-18 (Çarşamba)</b><br>Açılış: 96.20 TL<br>Kapanış: 93.25 TL<br>Günlük Değişim: -2.76%<br>Kapanış Saati: 16:30<br>Sinyal: SAT (Skor: -5, 4 gösterge)');
        strongSatDates.push('2026-03-19');
        strongSatPrices.push(92.55);
        strongSatTexts.push('<b>Tarih: 2026-03-19 (Perşembe)</b><br>Açılış: 92.40 TL<br>Kapanış: 92.55 TL<br>Günlük Değişim: -0.75%<br>Kapanış Saati: 12:30<br>Sinyal: Güçlü SAT (Skor: -8, 3 gösterge)');
        satDates.push('2026-03-25');
        satPrices.push(91.40);
        satTexts.push('<b>Tarih: 2026-03-25 (Çarşamba)</b><br>Açılış: 91.35 TL<br>Kapanış: 91.40 TL<br>Günlük Değişim: 1.56%<br>Kapanış Saati: 16:30<br>Sinyal: SAT (Skor: -6, 2 gösterge)');
        strongSatDates.push('2026-03-27');
        strongSatPrices.push(88.95);
        strongSatTexts.push('<b>Tarih: 2026-03-27 (Cuma)</b><br>Açılış: 90.45 TL<br>Kapanış: 88.95 TL<br>Günlük Değişim: -1.44%<br>Kapanış Saati: 16:30<br>Sinyal: Güçlü SAT (Skor: -8, 3 gösterge)');
        satDates.push('2026-03-30');
        satPrices.push(89.00);
        satTexts.push('<b>Tarih: 2026-03-30 (Pazartesi)</b><br>Açılış: 88.50 TL<br>Kapanış: 89.00 TL<br>Günlük Değişim: 0.06%<br>Kapanış Saati: 17:30<br>Sinyal: SAT (Skor: -6, 2 gösterge)');
        strongAlDates.push('2026-04-01');
        strongAlPrices.push(90.70);
        strongAlTexts.push('<b>Tarih: 2026-04-01 (Çarşamba)</b><br>Açılış: 91.10 TL<br>Kapanış: 90.70 TL<br>Günlük Değişim: 1.23%<br>Kapanış Saati: 17:30<br>Sinyal: Güçlü AL (Skor: 7, 3 gösterge)');

        // Build custom data for hover template
        var customdata = [];
        for (let i = 0; i < dates.length; i++) {
            customdata.push([opens[i], dailyChanges[i], closingTimes[i], signalTypes[i], dayNames[i], volumes[i]]);
        }

        // Price chart traces
        var tracePrice = {
            x: dates,
            y: prices,
            customdata: customdata,
            type: 'scatter',
            mode: 'lines',
            name: 'Kapanış Fiyatı',
            line: { color: '#1a1a1a', width: 2 },
            hovertemplate: '<b>Tarih: %{x} (%{customdata[4]})</b><br>Açılış: %{customdata[0]:.2f} TL<br>Kapanış: %{y:.2f} TL<br>Günlük Değişim: %{customdata[1]:.2f}%<br>Kapanış Saati: %{customdata[2]}<br>Günlük Hacim: %{customdata[5]:,.0f}<br>Sinyal: %{customdata[3]}<extra></extra>',
            yaxis: 'y'
        };

        var traceSMA20 = {
            x: dates,
            y: sma20,
            type: 'scatter',
            mode: 'lines',
            name: 'SMA20',
            line: { color: '#4285F4', width: 1.5, dash: 'dot' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>SMA20: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceSMA50 = {
            x: dates,
            y: sma50,
            type: 'scatter',
            mode: 'lines',
            name: 'SMA50',
            line: { color: '#FBBC05', width: 1.5, dash: 'dot' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>SMA50: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceEMA12 = {
            x: dates,
            y: ema12,
            type: 'scatter',
            mode: 'lines',
            name: 'EMA12',
            line: { color: '#34D399', width: 1.5, dash: 'dash' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>EMA12: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceAlSignals = {
            x: alDates,
            y: alPrices,
            text: alTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'AL Sinyali',
            marker: { color: '#4ADE80', size: 12, symbol: 'triangle-up', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceStrongAlSignals = {
            x: strongAlDates,
            y: strongAlPrices,
            text: strongAlTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'GÜÇLÜ AL Sinyali',
            marker: { color: '#15803D', size: 13, symbol: 'triangle-up', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceSatSignals = {
            x: satDates,
            y: satPrices,
            text: satTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'SAT Sinyali',
            marker: { color: '#FB7185', size: 12, symbol: 'triangle-down', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceStrongSatSignals = {
            x: strongSatDates,
            y: strongSatPrices,
            text: strongSatTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'GÜÇLÜ SAT Sinyali',
            marker: { color: '#991B1B', size: 13, symbol: 'triangle-down', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        // RSI chart trace (hidden)
        var traceRSI = {
            x: dates,
            y: rsi,
            type: 'scatter',
            mode: 'lines',
            name: 'RSI(14)',
            line: { color: '#A855F7', width: 2 },
            hovertemplate: '<b>%{x}</b><br>RSI: %{y:.1f}<extra></extra>',
            visible: false,
            showlegend: false,
            yaxis: 'y2',
            xaxis: 'x'
        };

        var traceVolume = {
            x: dates,
            y: volumes,
            type: 'bar',
            mode: 'markers',
            name: 'Hacim',
            marker: { color: 'rgba(68, 85, 102, 0.5)' },
            hovertemplate: '<b>Tarih: %{x|%Y-%m-%d}</b><br>Hacim: %{y:,.0f}<extra></extra>',
            visible: true,
            yaxis: 'y2',
            xaxis: 'x'
        };

        var traceRSI70 = {
            x: dates,
            y: Array(dates.length).fill(70),
            type: 'scatter',
            mode: 'lines',
            name: 'RSI 70 (Aşırı Alım)',
            line: { color: '#EF4444', width: 1, dash: 'dash' },
            visible: false,
            showlegend: false,
            hoverinfo: 'skip',
            yaxis: 'y2',
            xaxis: 'x'
        };

        var traceRSI30 = {
            x: dates,
            y: Array(dates.length).fill(30),
            type: 'scatter',
            mode: 'lines',
            name: 'RSI 30 (Aşırı Satış)',
            line: { color: '#22C55E', width: 1, dash: 'dash' },
            visible: false,
            showlegend: false,
            hoverinfo: 'skip',
            yaxis: 'y2',
            xaxis: 'x'
        };

        // Layout configuration
        var layout = {
            title: {
                text: 'SAHOL - Teknik Analiz',
                font: { size: 18, color: '#1a1a1a' }
            },
            xaxis: {
                title: 'Tarih',
                type: 'date',
                tickformat: '%Y-%m',
                nticks: 12,
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            yaxis: {
                title: 'Fiyat (₺)',
                domain: [0.3, 1],
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            yaxis2: {
                title: 'Hacim',
                domain: [0, 0.25],
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            hovermode: 'closest',
            plot_bgcolor: '#fafafa',
            paper_bgcolor: '#ffffff',
            font: { family: 'Segoe UI, Arial', size: 12 },
            legend: {
                x: 0,
                y: 1.1,
                orientation: 'h',
                bgcolor: 'rgba(255,255,255,0.9)',

                borderwidth: 1
            },
            margin: { t: 100, b: 80, l: 80, r: 50 }
        };

            responsive: true,
            displayModeBar: true,
            displaylogo: false,
            modeBarButtonsToRemove: ['toImage', 'sendDataToCloud'],
            locale: 'tr'
        };

        // Render chart
        var data = [tracePrice, traceSMA20, traceSMA50, traceEMA12, traceAlSignals, traceStrongAlSignals, traceSatSignals, traceStrongSatSignals, traceVolume, traceRSI, traceRSI70, traceRSI30];
        Plotly.newPlot('chart', data, layout, config);

</body>
</html>
