<!DOCTYPE html>

        var ema12 = [2.91, 2.91, 2.90, 2.93, 2.93, 2.78, 2.73, 2.72, 2.75, 2.73, 2.68, 2.68, 2.65, 2.64, 2.59, 2.59, 2.64, 2.66, 2.68, 2.73];

        var rsi = [38.65, 49.24, 44.33, 56.54, 50.72, 27.92, 35.50, 36.51, 60.46, 48.30, 38.59, 51.08, 46.43, 41.85, 34.77, 50.18, 55.83, 60.79, 55.33, 74.07];

        // BUY/SELL signals (4 types)
        var alDates = [], alPrices = [], alTexts = [];

        strongSatDates.push('2026-03-16');

            name: 'Kapanış Fiyatı',
            line: { color: '#1a1a1a', width: 2 },
            hovertemplate: '<b>Tarih: %{x} (%{customdata[4]})</b><br>Açılış: %{customdata[0]:.2f} TL<br>Kapanış: %{y:.2f} TL<br>Günlük Değişim: %{customdata[1]:.2f}%<br>Kapanış Saati: %{customdata[2]}<br>Günlük Hacim: %{customdata[5]:,.0f}<br>Sinyal: %{customdata[3]}<extra></extra>',
            yaxis: 'y'
        };

        var traceSMA20 = {
            x: dates,
            y: sma20,
            type: 'scatter',
            mode: 'lines',
            name: 'SMA20',
            line: { color: '#4285F4', width: 1.5, dash: 'dot' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>SMA20: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceSMA50 = {

            y: sma50,
            type: 'scatter',
            mode: 'lines',
            name: 'SMA50',

            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>EMA12: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceAlSignals = {
            x: alDates,
            y: alPrices,
            text: alTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'AL Sinyali',
            marker: { color: '#4ADE80', size: 12, symbol: 'triangle-up', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceStrongAlSignals = {
            x: strongAlDates,
            y: strongAlPrices,
            text: strongAlTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'GÜÇLÜ AL Sinyali',
            marker: { color: '#15803D', size: 13, symbol: 'triangle-up', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceSatSignals = {
            x: satDates,
            y: satPrices,
            text: satTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'SAT Sinyali',
            marker: { color: '#FB7185', size: 12, symbol: 'triangle-down', line: { color: '#fff', width: 2 } },

            yaxis: 'y'
        };

        var traceRSI = {
            x: dates,
            y: rsi,
            type: 'scatter',
            mode: 'lines',
            name: 'RSI(14)',
            line: { color: '#A855F7', width: 2 },
            hovertemplate: '<b>%{x}</b><br>RSI: %{y:.1f}<extra></extra>',
            visible: false,
            showlegend: false,
            yaxis: 'y2',
            xaxis: 'x'
        };

            x: dates,
            y: volumes,
            type: 'bar',
            mode: 'markers',
            name: 'Hacim',
            marker: { color: 'rgba(68, 85, 102, 0.5)' },
            hovertemplate: '<b>Tarih: %{x|%Y-%m-%d}</b><br>Hacim: %{y:,.0f}<extra></extra>',
            visible: true,
            yaxis: 'y2',
            xaxis: 'x'

            visible: false,
            showlegend: false,
            hoverinfo: 'skip',
            yaxis: 'y2',
            xaxis: 'x'

                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            yaxis2: {
                title: 'Hacim',
                domain: [0, 0.25],

                gridcolor: '#e5e5e5'
