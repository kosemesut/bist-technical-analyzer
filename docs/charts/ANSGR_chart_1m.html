            yaxis: 'y'
        };

            y: sma20,
            type: 'scatter',
            mode: 'lines',
            name: 'SMA20',
            line: { color: '#4285F4', width: 1.5, dash: 'dot' },

        };

            y: alPrices,

            mode: 'markers',
            name: 'AL Sinyali',
