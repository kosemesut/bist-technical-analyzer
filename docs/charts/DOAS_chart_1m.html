<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOAS - Teknik Analiz</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body { margin: 0; padding: 20px; background: #f5f5f5; font-family: 'Segoe UI', Arial, sans-serif; }
        .chart-container { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin: 0 0 20px 0; color: #1a1a1a; font-size: 24px; }
    </style>
</head>
<body>

        var signalTypes = ['', '', '', '', '', 'Güçlü AL (Skor: 11, 4 gösterge)', '', 'SAT (Skor: -5, 2 gösterge)', '', 'Güçlü SAT (Skor: -10, 4 gösterge)', 'SAT (Skor: -6, 2 gösterge)', 'Güçlü SAT (Skor: -8, 3 gösterge)', '', 'AL (Skor: 7, 2 gösterge)', '', '', '', 'Güçlü SAT (Skor: -7, 3 gösterge)', '', 'AL (Skor: 8, 2 gösterge)', 'AL (Skor: 8, 2 gösterge)'];

        var sma20 = [199.02, 197.66, 196.83, 196.80, 196.84, 197.53, 197.39, 196.12, 195.04, 194.61, 193.61, 192.01, 191.55, 193.08, 194.34, 194.27, 194.46, 193.59, 194.93, 198.87, 202.83];

        var sma50 = [196.32, 196.56, 197.39, 197.75, 197.30, 197.40, 197.00, 196.57, 196.27, 195.84, 195.02, 193.83, 193.09, 193.18, 192.93, 193.17, 193.59, 193.92, 194.62, 195.97, 197.93];

        var ema12 = [198.51, 197.33, 196.91, 196.75, 196.92, 198.79, 197.03, 194.83, 195.33, 194.14, 193.19, 191.24, 191.97, 194.57, 193.86, 194.26, 194.51, 192.51, 196.33, 200.97, 203.60];

        var rsi = [50.05, 53.80, 45.74, 53.91, 42.78, 78.80, 49.66, 43.70, 51.61, 40.70, 48.23, 30.45, 61.97, 68.72, 54.06, 49.61, 53.20, 23.67, 55.13, 69.53, 62.44];

        // BUY/SELL signals (4 types)
        var alDates = [], alPrices = [], alTexts = [];
        var strongAlDates = [], strongAlPrices = [], strongAlTexts = [];
        var satDates = [], satPrices = [], satTexts = [];
        var strongSatDates = [], strongSatPrices = [], strongSatTexts = [];
        strongAlDates.push('2026-03-19');
        strongAlPrices.push(206.50);
        strongAlTexts.push('<b>Tarih: 2026-03-19 (Perşembe)</b><br>Açılış: 196.60 TL<br>Kapanış: 206.50 TL<br>Günlük Değişim: 5.41%<br>Kapanış Saati: 12:30<br>Sinyal: Güçlü AL (Skor: 11, 4 gösterge)');
        satDates.push('2026-03-24');
        satPrices.push(193.90);
        satTexts.push('<b>Tarih: 2026-03-24 (Salı)</b><br>Açılış: 197.00 TL<br>Kapanış: 193.90 TL<br>Günlük Değişim: -1.57%<br>Kapanış Saati: 17:30<br>Sinyal: SAT (Skor: -5, 2 gösterge)');
        strongSatDates.push('2026-03-26');
        strongSatPrices.push(193.20);
        strongSatTexts.push('<b>Tarih: 2026-03-26 (Perşembe)</b><br>Açılış: 195.00 TL<br>Kapanış: 193.20 TL<br>Günlük Değişim: -1.38%<br>Kapanış Saati: 17:30<br>Sinyal: Güçlü SAT (Skor: -10, 4 gösterge)');
        satDates.push('2026-03-27');
        satPrices.push(193.60);
        satTexts.push('<b>Tarih: 2026-03-27 (Cuma)</b><br>Açılış: 193.10 TL<br>Kapanış: 193.60 TL<br>Günlük Değişim: 0.21%<br>Kapanış Saati: 17:30<br>Sinyal: SAT (Skor: -6, 2 gösterge)');
        strongSatDates.push('2026-03-30');
        strongSatPrices.push(189.80);
        strongSatTexts.push('<b>Tarih: 2026-03-30 (Pazartesi)</b><br>Açılış: 192.90 TL<br>Kapanış: 189.80 TL<br>Günlük Değişim: -1.96%<br>Kapanış Saati: 17:30<br>Sinyal: Güçlü SAT (Skor: -8, 3 gösterge)');
        alDates.push('2026-04-01');
        alPrices.push(195.70);
        alTexts.push('<b>Tarih: 2026-04-01 (Çarşamba)</b><br>Açılış: 195.20 TL<br>Kapanış: 195.70 TL<br>Günlük Değişim: 0.98%<br>Kapanış Saati: 17:30<br>Sinyal: AL (Skor: 7, 2 gösterge)');
        strongSatDates.push('2026-04-07');
        strongSatPrices.push(190.40);
        strongSatTexts.push('<b>Tarih: 2026-04-07 (Salı)</b><br>Açılış: 194.40 TL<br>Kapanış: 190.40 TL<br>Günlük Değişim: -2.16%<br>Kapanış Saati: 17:30<br>Sinyal: Güçlü SAT (Skor: -7, 3 gösterge)');
        alDates.push('2026-04-09');
        alPrices.push(202.80);
        alTexts.push('<b>Tarih: 2026-04-09 (Perşembe)</b><br>Açılış: 200.00 TL<br>Kapanış: 202.80 TL<br>Günlük Değişim: 3.26%<br>Kapanış Saati: 17:30<br>Sinyal: AL (Skor: 8, 2 gösterge)');
        alDates.push('2026-04-10');
        alPrices.push(204.10);
        alTexts.push('<b>Tarih: 2026-04-10 (Cuma)</b><br>Açılış: 204.50 TL<br>Kapanış: 204.10 TL<br>Günlük Değişim: 0.64%<br>Kapanış Saati: 18:00<br>Sinyal: AL (Skor: 8, 2 gösterge)');

        // Build custom data for hover template
        var customdata = [];
        for (let i = 0; i < dates.length; i++) {
            customdata.push([opens[i], dailyChanges[i], closingTimes[i], signalTypes[i], dayNames[i], volumes[i]]);
        }

        // Price chart traces
        var tracePrice = {
            x: dates,
            y: prices,
            customdata: customdata,
            type: 'scatter',
            mode: 'lines',
            name: 'Kapanış Fiyatı',
            line: { color: '#1a1a1a', width: 2 },
            hovertemplate: '<b>Tarih: %{x} (%{customdata[4]})</b><br>Açılış: %{customdata[0]:.2f} TL<br>Kapanış: %{y:.2f} TL<br>Günlük Değişim: %{customdata[1]:.2f}%<br>Kapanış Saati: %{customdata[2]}<br>Günlük Hacim: %{customdata[5]:,.0f}<br>Sinyal: %{customdata[3]}<extra></extra>',
            yaxis: 'y'
        };

        var traceSMA20 = {
            x: dates,
            y: sma20,
            type: 'scatter',
            mode: 'lines',
            name: 'SMA20',
            line: { color: '#4285F4', width: 1.5, dash: 'dot' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>SMA20: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceSMA50 = {
            x: dates,
            y: sma50,
            type: 'scatter',
            mode: 'lines',
            name: 'SMA50',
            line: { color: '#FBBC05', width: 1.5, dash: 'dot' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>SMA50: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceEMA12 = {
            x: dates,
            y: ema12,
            type: 'scatter',
            mode: 'lines',
            name: 'EMA12',
            line: { color: '#34D399', width: 1.5, dash: 'dash' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>EMA12: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceAlSignals = {
            x: alDates,
            y: alPrices,
            text: alTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'AL Sinyali',
            marker: { color: '#4ADE80', size: 12, symbol: 'triangle-up', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceStrongAlSignals = {
            x: strongAlDates,
            y: strongAlPrices,
            text: strongAlTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'GÜÇLÜ AL Sinyali',
            marker: { color: '#15803D', size: 13, symbol: 'triangle-up', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceSatSignals = {
            x: satDates,
            y: satPrices,
            text: satTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'SAT Sinyali',
            marker: { color: '#FB7185', size: 12, symbol: 'triangle-down', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceStrongSatSignals = {
            x: strongSatDates,
            y: strongSatPrices,
            text: strongSatTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'GÜÇLÜ SAT Sinyali',
            marker: { color: '#991B1B', size: 13, symbol: 'triangle-down', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        // RSI chart trace (hidden)
        var traceRSI = {
            x: dates,
            y: rsi,
            type: 'scatter',
            mode: 'lines',
            name: 'RSI(14)',
            line: { color: '#A855F7', width: 2 },
            hovertemplate: '<b>%{x}</b><br>RSI: %{y:.1f}<extra></extra>',
            visible: false,
            showlegend: false,
            yaxis: 'y2',
            xaxis: 'x'
        };

        var traceVolume = {
            x: dates,
            y: volumes,
            type: 'bar',
            mode: 'markers',
            name: 'Hacim',
            marker: { color: 'rgba(68, 85, 102, 0.5)' },
            hovertemplate: '<b>Tarih: %{x|%Y-%m-%d}</b><br>Hacim: %{y:,.0f}<extra></extra>',
            visible: true,
            yaxis: 'y2',
            xaxis: 'x'
        };

        var traceRSI70 = {
            x: dates,
            y: Array(dates.length).fill(70),
            type: 'scatter',
            mode: 'lines',
            name: 'RSI 70 (Aşırı Alım)',
            line: { color: '#EF4444', width: 1, dash: 'dash' },
            visible: false,
            showlegend: false,
            hoverinfo: 'skip',
            yaxis: 'y2',
            xaxis: 'x'
        };

        var traceRSI30 = {
            x: dates,
            y: Array(dates.length).fill(30),
            type: 'scatter',
            mode: 'lines',
            name: 'RSI 30 (Aşırı Satış)',
            line: { color: '#22C55E', width: 1, dash: 'dash' },
            visible: false,
            showlegend: false,
            hoverinfo: 'skip',
            yaxis: 'y2',
            xaxis: 'x'
        };

        // Layout configuration
        var layout = {
            title: {
                text: 'DOAS - Teknik Analiz',
                font: { size: 18, color: '#1a1a1a' }
            },
            xaxis: {
                title: 'Tarih',
                type: 'date',
                tickformat: '%Y-%m',
                nticks: 12,
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            yaxis: {
                title: 'Fiyat (₺)',
                domain: [0.3, 1],
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            yaxis2: {
                title: 'Hacim',
                domain: [0, 0.25],
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            hovermode: 'closest',
            plot_bgcolor: '#fafafa',
            paper_bgcolor: '#ffffff',
            font: { family: 'Segoe UI, Arial', size: 12 },
            legend: {
                x: 0,
                y: 1.1,
                orientation: 'h',
                bgcolor: 'rgba(255,255,255,0.9)',

                borderwidth: 1
            },
            margin: { t: 100, b: 80, l: 80, r: 50 }
        };

            responsive: true,
            displayModeBar: true,
            displaylogo: false,
            modeBarButtonsToRemove: ['toImage', 'sendDataToCloud'],
            locale: 'tr'
        };

        // Render chart
        var data = [tracePrice, traceSMA20, traceSMA50, traceEMA12, traceAlSignals, traceStrongAlSignals, traceSatSignals, traceStrongSatSignals, traceVolume, traceRSI, traceRSI70, traceRSI30];
        Plotly.newPlot('chart', data, layout, config);

</body>
</html>
