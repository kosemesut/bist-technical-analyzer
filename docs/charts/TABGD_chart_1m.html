<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABGD - Teknik Analiz</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>

</head>
<body>

        var closingTimes = ['16:30', '16:30', '16:30', '16:30', '16:30', '16:30', '16:30', '16:30', '16:30', '16:30', '16:30', '16:30', '16:30', '16:30', '16:30', '16:30', '16:30', '16:30', '12:30', '16:30', '15:19'];

        var signalTypes = ['', 'Güçlü SAT (Skor: -10, 4 gösterge)', 'Güçlü SAT (Skor: -8, 3 gösterge)', '', '', 'Güçlü SAT (Skor: -6, 3 gösterge)', '', '', '', '', '', '', 'Güçlü AL (Skor: 8, 3 gösterge)', 'AL (Skor: 6, 2 gösterge)', '', '', '', 'Güçlü SAT (Skor: -10, 4 gösterge)', 'AL (Skor: 5, 2 gösterge)', '', 'Güçlü SAT (Skor: -8, 3 gösterge)'];

        var dayNames = ['Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Pazartesi', 'Salı'];

        var sma20 = [266.39, 264.31, 262.54, 261.23, 261.43, 254.64, 249.64, 247.31, 250.98, 254.01, 250.70, 248.75, 252.00, 255.36, 256.79, 256.61, 254.74, 252.17, 251.58, 249.28, 248.08];

        var sma50 = [271.07, 269.38, 267.89, 265.33, 263.19, 259.64, 257.17, 254.29, 253.60, 252.74, 249.45, 250.45, 251.31, 253.03, 253.52, 253.44, 254.67, 254.58, 254.50, 253.00, 251.72];

        var ema12 = [266.66, 262.60, 261.11, 261.99, 261.67, 247.91, 249.69, 247.06, 254.63, 253.98, 245.98, 250.86, 254.17, 256.13, 257.10, 256.14, 253.52, 250.95, 251.98, 248.14, 247.70];

        var rsi = [53.18, 32.88, 40.17, 54.56, 45.05, 31.91, 40.73, 44.38, 53.36, 40.31, 38.97, 51.50, 62.70, 55.16, 58.95, 48.56, 49.04, 31.98, 62.61, 50.26, 44.95];

        // BUY/SELL signals (4 types)
        var alDates = [], alPrices = [], alTexts = [];
        var strongAlDates = [], strongAlPrices = [], strongAlTexts = [];
        var satDates = [], satPrices = [], satTexts = [];
        var strongSatDates = [], strongSatPrices = [], strongSatTexts = [];
        strongSatDates.push('2026-02-24');
        strongSatPrices.push(258.75);
        strongSatTexts.push('<b>Tarih: 2026-02-24 (Salı)</b><br>Açılış: 265.50 TL<br>Kapanış: 258.75 TL<br>Günlük Değişim: -3.90%<br>Kapanış Saati: 16:30<br>Sinyal: Güçlü SAT (Skor: -10, 4 gösterge)');
        strongSatDates.push('2026-02-25');
        strongSatPrices.push(259.50);
        strongSatTexts.push('<b>Tarih: 2026-02-25 (Çarşamba)</b><br>Açılış: 265.00 TL<br>Kapanış: 259.50 TL<br>Günlük Değişim: 0.29%<br>Kapanış Saati: 16:30<br>Sinyal: Güçlü SAT (Skor: -8, 3 gösterge)');
        strongSatDates.push('2026-03-02');
        strongSatPrices.push(245.00);
        strongSatTexts.push('<b>Tarih: 2026-03-02 (Pazartesi)</b><br>Açılış: 244.40 TL<br>Kapanış: 245.00 TL<br>Günlük Değişim: -6.04%<br>Kapanış Saati: 16:30<br>Sinyal: Güçlü SAT (Skor: -6, 3 gösterge)');
        strongAlDates.push('2026-03-11');
        strongAlPrices.push(257.75);
        strongAlTexts.push('<b>Tarih: 2026-03-11 (Çarşamba)</b><br>Açılış: 251.75 TL<br>Kapanış: 257.75 TL<br>Günlük Değişim: 2.59%<br>Kapanış Saati: 16:30<br>Sinyal: Güçlü AL (Skor: 8, 3 gösterge)');
        alDates.push('2026-03-12');
        alPrices.push(256.25);
        alTexts.push('<b>Tarih: 2026-03-12 (Perşembe)</b><br>Açılış: 255.25 TL<br>Kapanış: 256.25 TL<br>Günlük Değişim: -0.58%<br>Kapanış Saati: 16:30<br>Sinyal: AL (Skor: 6, 2 gösterge)');
        strongSatDates.push('2026-03-18');
        strongSatPrices.push(247.60);
        strongSatTexts.push('<b>Tarih: 2026-03-18 (Çarşamba)</b><br>Açılış: 253.75 TL<br>Kapanış: 247.60 TL<br>Günlük Değişim: -2.52%<br>Kapanış Saati: 16:30<br>Sinyal: Güçlü SAT (Skor: -10, 4 gösterge)');
        alDates.push('2026-03-19');
        alPrices.push(257.25);
        alTexts.push('<b>Tarih: 2026-03-19 (Perşembe)</b><br>Açılış: 247.60 TL<br>Kapanış: 257.25 TL<br>Günlük Değişim: 3.90%<br>Kapanış Saati: 12:30<br>Sinyal: AL (Skor: 5, 2 gösterge)');
        strongSatDates.push('2026-03-24');
        strongSatPrices.push(246.80);
        strongSatTexts.push('<b>Tarih: 2026-03-24 (Salı)</b><br>Açılış: 248.50 TL<br>Kapanış: 246.80 TL<br>Günlük Değişim: -1.28%<br>Kapanış Saati: 15:19<br>Sinyal: Güçlü SAT (Skor: -8, 3 gösterge)');

        // Build custom data for hover template
        var customdata = [];
        for (let i = 0; i < dates.length; i++) {
            customdata.push([opens[i], dailyChanges[i], closingTimes[i], signalTypes[i], dayNames[i], volumes[i]]);
        }

        // Price chart traces
        var tracePrice = {
            x: dates,
            y: prices,
            customdata: customdata,
            type: 'scatter',
            mode: 'lines',
            name: 'Kapanış Fiyatı',
            line: { color: '#1a1a1a', width: 2 },
            hovertemplate: '<b>Tarih: %{x} (%{customdata[4]})</b><br>Açılış: %{customdata[0]:.2f} TL<br>Kapanış: %{y:.2f} TL<br>Günlük Değişim: %{customdata[1]:.2f}%<br>Kapanış Saati: %{customdata[2]}<br>Günlük Hacim: %{customdata[5]:,.0f}<br>Sinyal: %{customdata[3]}<extra></extra>',
            yaxis: 'y'
        };

        var traceSMA20 = {
            x: dates,
            y: sma20,
            type: 'scatter',
            mode: 'lines',
            name: 'SMA20',
            line: { color: '#4285F4', width: 1.5, dash: 'dot' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>SMA20: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceSMA50 = {
            x: dates,
            y: sma50,
            type: 'scatter',
            mode: 'lines',
            name: 'SMA50',
            line: { color: '#FBBC05', width: 1.5, dash: 'dot' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>SMA50: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceEMA12 = {
            x: dates,
            y: ema12,
            type: 'scatter',
            mode: 'lines',
            name: 'EMA12',
            line: { color: '#34D399', width: 1.5, dash: 'dash' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>EMA12: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceAlSignals = {
            x: alDates,
            y: alPrices,
            text: alTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'AL Sinyali',
            marker: { color: '#4ADE80', size: 12, symbol: 'triangle-up', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceStrongAlSignals = {
            x: strongAlDates,
            y: strongAlPrices,
            text: strongAlTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'GÜÇLÜ AL Sinyali',
            marker: { color: '#15803D', size: 13, symbol: 'triangle-up', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceSatSignals = {
            x: satDates,
            y: satPrices,
            text: satTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'SAT Sinyali',
            marker: { color: '#FB7185', size: 12, symbol: 'triangle-down', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceStrongSatSignals = {
            x: strongSatDates,
            y: strongSatPrices,
            text: strongSatTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'GÜÇLÜ SAT Sinyali',
            marker: { color: '#991B1B', size: 13, symbol: 'triangle-down', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        // RSI chart trace (hidden)
        var traceRSI = {
            x: dates,
            y: rsi,
            type: 'scatter',
            mode: 'lines',
            name: 'RSI(14)',
            line: { color: '#A855F7', width: 2 },
            hovertemplate: '<b>%{x}</b><br>RSI: %{y:.1f}<extra></extra>',
            visible: false,
            showlegend: false,
            yaxis: 'y2',
            xaxis: 'x'
        };

        var traceVolume = {
            x: dates,
            y: volumes,
            type: 'bar',
            mode: 'markers',
            name: 'Hacim',
            marker: { color: 'rgba(68, 85, 102, 0.5)' },
            hovertemplate: '<b>Tarih: %{x|%Y-%m-%d}</b><br>Hacim: %{y:,.0f}<extra></extra>',
            visible: true,
            yaxis: 'y2',
            xaxis: 'x'
        };

        var traceRSI70 = {
            x: dates,
            y: Array(dates.length).fill(70),
            type: 'scatter',
            mode: 'lines',
            name: 'RSI 70 (Aşırı Alım)',
            line: { color: '#EF4444', width: 1, dash: 'dash' },
            visible: false,
            showlegend: false,
            hoverinfo: 'skip',
            yaxis: 'y2',
            xaxis: 'x'

            y: Array(dates.length).fill(30),
            type: 'scatter',
            mode: 'lines',
            name: 'RSI 30 (Aşırı Satış)',
            line: { color: '#22C55E', width: 1, dash: 'dash' },
            visible: false,
            showlegend: false,
            hoverinfo: 'skip',
            yaxis: 'y2',
            xaxis: 'x'
        };

        // Layout configuration
        var layout = {
            title: {
                text: 'TABGD - Teknik Analiz',
                font: { size: 18, color: '#1a1a1a' }
            },
            xaxis: {
                title: 'Tarih',
                type: 'date',
                tickformat: '%Y-%m',
                nticks: 12,
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            yaxis: {
                title: 'Fiyat (₺)',
                domain: [0.3, 1],
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            yaxis2: {
                title: 'Hacim',
                domain: [0, 0.25],
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            hovermode: 'closest',
            plot_bgcolor: '#fafafa',
            paper_bgcolor: '#ffffff',
            font: { family: 'Segoe UI, Arial', size: 12 },
            legend: {

                y: 1.1,

            displayModeBar: true,
            displaylogo: false,

        Plotly.newPlot('chart', data, layout, config);

</body>
</html>
