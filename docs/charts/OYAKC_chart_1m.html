        var satDates = [], satPrices = [], satTexts = [];

        strongSatDates.push('2026-02-19');

            yaxis: 'y'

            y: sma20,
            type: 'scatter',
            mode: 'lines',
            name: 'SMA20',

            y: alPrices,
            text: alTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'AL Sinyali',
