<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCLK - Teknik Analiz</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body { margin: 0; padding: 20px; background: #f5f5f5; font-family: 'Segoe UI', Arial, sans-serif; }
        .chart-container { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin: 0 0 20px 0; color: #1a1a1a; font-size: 24px; }
    </style>
</head>
<body>
    <div class="chart-container">
        <h2>📊 ARCLK - Teknik Analiz Grafiği</h2>
        <div id="chart" style="width:100%; height:800px;"></div>
    </div>
    <script>
        // Data preparation (daily aggregated)
        var dates = ['2026-03-30', '2026-03-31', '2026-04-01', '2026-04-02', '2026-04-03', '2026-04-06', '2026-04-07', '2026-04-08', '2026-04-09', '2026-04-10', '2026-04-13', '2026-04-14', '2026-04-15', '2026-04-16', '2026-04-17', '2026-04-20', '2026-04-21', '2026-04-22', '2026-04-24']

        var prices = [108.40, 108.70, 110.20, 110.90, 109.40, 110.20, 107.10, 112.20, 113.20, 117.50, 119.70, 118.00, 118.60, 116.10, 119.00, 116.50, 117.00, 115.50, 117.20];

        var opens = [110.20, 108.10, 110.20, 108.90, 110.90, 109.60, 110.50, 110.50, 112.00, 116.60, 115.00, 120.80, 118.00, 118.90, 115.90, 118.70, 120.00, 116.90, 113.30];

        var highs = [112.10, 109.70, 111.40, 111.10, 111.00, 110.80, 110.90, 113.70, 113.50, 118.30, 120.80, 121.00, 119.20, 120.40, 119.30, 118.70, 120.50, 117.30, 119.90];

        var lows = [108.10, 106.00, 108.80, 108.00, 108.80, 109.50, 107.00, 110.50, 110.50, 115.20, 114.50, 116.60, 117.60, 115.50, 114.90, 116.10, 116.50, 114.40, 112.40];

        var volumes = [1087854, 3120768, 1753839, 1051535, 776182, 941561, 1112647, 1978773, 1509982, 2667559, 3405401, 2578599, 976728, 1485645, 2502064, 872810, 2400084, 1227632, 6484575];

        var dailyChanges = [-2.17, 0.28, 1.38, 0.64, -1.35, 0.73, -2.81, 4.76, 0.89, 3.80, 1.87, -1.42, 0.51, -2.11, 2.50, -2.10, 0.43, -1.28, 1.47];

        var closingTimes = ['17:30', '17:30', '17:30', '17:30', '17:30', '17:30', '17:30', '17:30', '17:30', '17:30', '17:30', '17:30', '17:30', '17:30', '17:30', '17:30', '17:30', '17:30', '18:00'];

        var signalTypes = ['Güçlü SAT (Skor: -13, 5 gösterge)', 'SAT (Skor: -5, 3 gösterge)', '', 'AL (Skor: 4, 2 gösterge)', '', '', 'Güçlü SAT (Skor: -7, 3 gösterge)', '', 'Güçlü AL (Skor: 10, 4 gösterge)', 'Güçlü AL (Skor: 6, 3 gösterge)', 'Güçlü AL (Skor: 12, 4 gösterge)', '', '', '', 'AL (Skor: 4, 4 gösterge)', '', '', 'Güçlü SAT (Skor: -8, 3 gösterge)', ''];

        var dayNames = ['Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Pazartesi', 'Salı', 'Çarşamba', 'Cuma'];

        var sma20 = [110.78, 109.17, 108.79, 109.64, 109.88, 110.09, 109.47, 110.60, 111.57, 113.93, 116.99, 118.36, 118.54, 117.98, 117.20, 116.63, 117.25, 116.57, 116.51];

        var sma50 = [112.71, 111.74, 110.77, 110.01, 109.60, 109.54, 109.48, 110.18, 110.55, 111.69, 113.22, 114.75, 116.28, 117.28, 117.77, 117.71, 117.44, 116.99, 116.77];

        var ema12 = [110.25, 108.45, 109.43, 109.88, 109.76, 110.07, 108.76, 111.70, 111.86, 115.67, 118.01, 118.21, 118.37, 117.40, 117.24, 116.82, 117.12, 115.91, 117.13];

        var rsi = [29.12, 43.59, 53.92, 58.55, 46.16, 52.65, 26.49, 59.11, 64.46, 71.33, 74.30, 54.11, 55.95, 38.97, 61.71, 46.61, 49.00, 42.13, 51.80];

        // BUY/SELL signals (4 types)
        var alDates = [], alPrices = [], alTexts = [];
        var strongAlDates = [], strongAlPrices = [], strongAlTexts = [];
        var satDates = [], satPrices = [], satTexts = [];
        var strongSatDates = [], strongSatPrices = [], strongSatTexts = [];
        strongSatDates.push('2026-03-30');
        strongSatPrices.push(108.40);
        strongSatTexts.push('<b>Tarih: 2026-03-30 (Pazartesi)</b><br>Açılış: 110.20 TL<br>Kapanış: 108.40 TL<br>Günlük Değişim: -2.17%<br>Kapanış Saati: 17:30<br>Sinyal: Güçlü SAT (Skor: -13, 5 gösterge)');
        satDates.push('2026-03-31');
        satPrices.push(108.70);
        satTexts.push('<b>Tarih: 2026-03-31 (Salı)</b><br>Açılış: 108.10 TL<br>Kapanış: 108.70 TL<br>Günlük Değişim: 0.28%<br>Kapanış Saati: 17:30<br>Sinyal: SAT (Skor: -5, 3 gösterge)');
        alDates.push('2026-04-02');
        alPrices.push(110.90);
        alTexts.push('<b>Tarih: 2026-04-02 (Perşembe)</b><br>Açılış: 108.90 TL<br>Kapanış: 110.90 TL<br>Günlük Değişim: 0.64%<br>Kapanış Saati: 17:30<br>Sinyal: AL (Skor: 4, 2 gösterge)');
        strongSatDates.push('2026-04-07');
        strongSatPrices.push(107.10);
        strongSatTexts.push('<b>Tarih: 2026-04-07 (Salı)</b><br>Açılış: 110.50 TL<br>Kapanış: 107.10 TL<br>Günlük Değişim: -2.81%<br>Kapanış Saati: 17:30<br>Sinyal: Güçlü SAT (Skor: -7, 3 gösterge)');
        strongAlDates.push('2026-04-09');
        strongAlPrices.push(113.20);
        strongAlTexts.push('<b>Tarih: 2026-04-09 (Perşembe)</b><br>Açılış: 112.00 TL<br>Kapanış: 113.20 TL<br>Günlük Değişim: 0.89%<br>Kapanış Saati: 17:30<br>Sinyal: Güçlü AL (Skor: 10, 4 gösterge)');
        strongAlDates.push('2026-04-10');
        strongAlPrices.push(117.50);
        strongAlTexts.push('<b>Tarih: 2026-04-10 (Cuma)</b><br>Açılış: 116.60 TL<br>Kapanış: 117.50 TL<br>Günlük Değişim: 3.80%<br>Kapanış Saati: 17:30<br>Sinyal: Güçlü AL (Skor: 6, 3 gösterge)');
        strongAlDates.push('2026-04-13');
        strongAlPrices.push(119.70);
        strongAlTexts.push('<b>Tarih: 2026-04-13 (Pazartesi)</b><br>Açılış: 115.00 TL<br>Kapanış: 119.70 TL<br>Günlük Değişim: 1.87%<br>Kapanış Saati: 17:30<br>Sinyal: Güçlü AL (Skor: 12, 4 gösterge)');
        alDates.push('2026-04-17');
        alPrices.push(119.00);
        alTexts.push('<b>Tarih: 2026-04-17 (Cuma)</b><br>Açılış: 115.90 TL<br>Kapanış: 119.00 TL<br>Günlük Değişim: 2.50%<br>Kapanış Saati: 17:30<br>Sinyal: AL (Skor: 4, 4 gösterge)');
        strongSatDates.push('2026-04-22');
        strongSatPrices.push(115.50);
        strongSatTexts.push('<b>Tarih: 2026-04-22 (Çarşamba)</b><br>Açılış: 116.90 TL<br>Kapanış: 115.50 TL<br>Günlük Değişim: -1.28%<br>Kapanış Saati: 17:30<br>Sinyal: Güçlü SAT (Skor: -8, 3 gösterge)');

        // Build custom data for hover template
        var customdata = [];
        for (let i = 0; i < dates.length; i++) {
            customdata.push([opens[i], dailyChanges[i], closingTimes[i], signalTypes[i], dayNames[i], volumes[i]]);
        }

        // Price chart traces
        var tracePrice = {
            x: dates,
            y: prices,
            customdata: customdata,
            type: 'scatter',
            mode: 'lines',
            name: 'Kapanış Fiyatı',
            line: { color: '#1a1a1a', width: 2 },
            hovertemplate: '<b>Tarih: %{x} (%{customdata[4]})</b><br>Açılış: %{customdata[0]:.2f} TL<br>Kapanış: %{y:.2f} TL<br>Günlük Değişim: %{customdata[1]:.2f}%<br>Kapanış Saati: %{customdata[2]}<br>Günlük Hacim: %{customdata[5]:,.0f}<br>Sinyal: %{customdata[3]}<extra></extra>',
            yaxis: 'y'
        };

        var traceSMA20 = {
            x: dates,
            y: sma20,
            type: 'scatter',
            mode: 'lines',
            name: 'SMA20',
            line: { color: '#4285F4', width: 1.5, dash: 'dot' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>SMA20: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceSMA50 = {
            x: dates,
            y: sma50,
            type: 'scatter',
            mode: 'lines',
            name: 'SMA50',
            line: { color: '#FBBC05', width: 1.5, dash: 'dot' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>SMA50: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceEMA12 = {
            x: dates,
            y: ema12,
            type: 'scatter',
            mode: 'lines',
            name: 'EMA12',
            line: { color: '#34D399', width: 1.5, dash: 'dash' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>EMA12: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

        var traceAlSignals = {
            x: alDates,
            y: alPrices,
            text: alTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'AL Sinyali',
            marker: { color: '#4ADE80', size: 12, symbol: 'triangle-up', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceStrongAlSignals = {
            x: strongAlDates,
            y: strongAlPrices,
            text: strongAlTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'GÜÇLÜ AL Sinyali',
            marker: { color: '#15803D', size: 13, symbol: 'triangle-up', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceSatSignals = {
            x: satDates,
            y: satPrices,
            text: satTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'SAT Sinyali',
            marker: { color: '#FB7185', size: 12, symbol: 'triangle-down', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        var traceStrongSatSignals = {
            x: strongSatDates,
            y: strongSatPrices,
            text: strongSatTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'GÜÇLÜ SAT Sinyali',
            marker: { color: '#991B1B', size: 13, symbol: 'triangle-down', line: { color: '#fff', width: 2 } },
            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

        // RSI chart trace (hidden)
        var traceRSI = {
            x: dates,
            y: rsi,
            type: 'scatter',
            mode: 'lines',
            name: 'RSI(14)',
            line: { color: '#A855F7', width: 2 },
            hovertemplate: '<b>%{x}</b><br>RSI: %{y:.1f}<extra></extra>',
            visible: false,
            showlegend: false,
            yaxis: 'y2',
            xaxis: 'x'
        };

        var traceVolume = {
            x: dates,
            y: volumes,
            type: 'bar',
            mode: 'markers',
            name: 'Hacim',
            marker: { color: 'rgba(68, 85, 102, 0.5)' },
            hovertemplate: '<b>Tarih: %{x|%Y-%m-%d}</b><br>Hacim: %{y:,.0f}<extra></extra>',
            visible: true,
            yaxis: 'y2',
            xaxis: 'x'
        };

        var traceRSI70 = {
            x: dates,
            y: Array(dates.length).fill(70),
            type: 'scatter',
            mode: 'lines',
            name: 'RSI 70 (Aşırı Alım)',
            line: { color: '#EF4444', width: 1, dash: 'dash' },
            visible: false,
            showlegend: false,
            hoverinfo: 'skip',
            yaxis: 'y2',
            xaxis: 'x'
        };

        var traceRSI30 = {
            x: dates,
            y: Array(dates.length).fill(30),
            type: 'scatter',
            mode: 'lines',
            name: 'RSI 30 (Aşırı Satış)',
            line: { color: '#22C55E', width: 1, dash: 'dash' },
            visible: false,
            showlegend: false,
            hoverinfo: 'skip',
            yaxis: 'y2',
            xaxis: 'x'
        };

        // Layout configuration
        var layout = {
            title: {
                text: 'ARCLK - Teknik Analiz',
                font: { size: 18, color: '#1a1a1a' }
            },
            xaxis: {
                title: 'Tarih',
                type: 'date',
                tickformat: '%Y-%m',
                nticks: 12,
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            yaxis: {
                title: 'Fiyat (₺)',
                domain: [0.3, 1],
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            yaxis2: {
                title: 'Hacim',
                domain: [0, 0.25],
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            hovermode: 'closest',
            plot_bgcolor: '#fafafa',
            paper_bgcolor: '#ffffff',
            font: { family: 'Segoe UI, Arial', size: 12 },
            legend: {
                x: 0,
                y: 1.1,
                orientation: 'h',
                bgcolor: 'rgba(255,255,255,0.9)',
                bordercolor: '#e5e5e5',
                borderwidth: 1
            },
            margin: { t: 100, b: 80, l: 80, r: 50 }
        };

        var config = {
            responsive: true,
            displayModeBar: true,
            displaylogo: false,
            modeBarButtonsToRemove: ['toImage', 'sendDataToCloud'],
            locale: 'tr'
        };

        // Render chart
        var data = [tracePrice, traceSMA20, traceSMA50, traceEMA12, traceAlSignals, traceStrongAlSignals, traceSatSignals, traceStrongSatSignals, traceVolume, traceRSI, traceRSI70, traceRSI30];
        Plotly.newPlot('chart', data, layout, config);
    </script>
</body>
</html>
