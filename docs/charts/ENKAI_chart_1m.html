        // BUY/SELL signals (4 types)
        var alDates = [], alPrices = [], alTexts = [];
        var strongAlDates = [], strongAlPrices = [], strongAlTexts = [];
        var satDates = [], satPrices = [], satTexts = [];
        var strongSatDates = [], strongSatPrices = [], strongSatTexts = [];
        alDates.push('2026-03-16');
        alPrices.push(94.30);
        alTexts.push('<b>Tarih: 2026-03-16 (Pazartesi)</b><br>Açılış: 94.05 TL<br>Kapanış: 94.30 TL<br>Günlük Değişim: 0.69%<br>Kapanış Saati: 17:30<br>Sinyal: AL (Skor: 6, 2 gösterge)');

            yaxis: 'y'
        };

        var traceSMA20 = {
            x: dates,
            y: sma20,
            type: 'scatter',
            mode: 'lines',
            name: 'SMA20',
            line: { color: '#4285F4', width: 1.5, dash: 'dot' },
            hovertemplate: '<b>%{x|%Y-%m-%d %H:%M}</b><br>SMA20: %{y:.2f} TL<extra></extra>',
            visible: false,
            yaxis: 'y'
        };

            y: sma50,

            visible: false,
            yaxis: 'y'
        };

        var traceAlSignals = {
            x: alDates,
            y: alPrices,
            text: alTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'AL Sinyali',
            marker: { color: '#4ADE80', size: 12, symbol: 'triangle-up', line: { color: '#fff', width: 2 } },

            y: strongAlPrices,
            text: strongAlTexts,
            type: 'scatter',

            hovertemplate: '%{text}<extra></extra>',
            yaxis: 'y'
        };

            y: satPrices,
            text: satTexts,

            mode: 'markers',

            type: 'scatter',
            mode: 'lines',

            yaxis: 'y2',

            name: 'Hacim',
            marker: { color: 'rgba(68, 85, 102, 0.5)' },
