            mode: 'markers',

        var traceSatSignals = {
            x: satDates,
            y: satPrices,
            text: satTexts,
            type: 'scatter',
            mode: 'markers',
            name: 'SAT Sinyali',

        var traceStrongSatSignals = {

            name: 'GÜÇLÜ SAT Sinyali',

            hovertemplate: '%{text}<extra></extra>',

        var traceRSI = {
            x: dates,

            type: 'scatter',

            visible: false,
            showlegend: false,
            yaxis: 'y2',
            xaxis: 'x'
        };

        var traceVolume = {
            x: dates,
            y: volumes,
            type: 'bar',
            mode: 'markers',

            marker: { color: 'rgba(68, 85, 102, 0.5)' },

            visible: false,
            showlegend: false,
            hoverinfo: 'skip',
            yaxis: 'y2',
            xaxis: 'x'
        };

        // Layout configuration
        var layout = {
            title: {
                text: 'ARCLK - Teknik Analiz',
                font: { size: 18, color: '#1a1a1a' }

            xaxis: {
                title: 'Tarih',

                tickformat: '%Y-%m',
                nticks: 12,
                showgrid: true,

            yaxis: {

                domain: [0.3, 1],
                showgrid: true,
                gridcolor: '#e5e5e5'
            },
            yaxis2: {
                title: 'Hacim',

            hovermode: 'closest',

            legend: {

            margin: { t: 100, b: 80, l: 80, r: 50 }

        var config = {
            responsive: true,
            displayModeBar: true,
            displaylogo: false,
            modeBarButtonsToRemove: ['toImage', 'sendDataToCloud'],
            locale: 'tr'

        // Render chart
        var data = [tracePrice, traceSMA20, traceSMA50, traceEMA12, traceAlSignals, traceStrongAlSignals, traceSatSignals, traceStrongSatSignals, traceVolume, traceRSI, traceRSI70, traceRSI30];
        Plotly.newPlot('chart', data, layout, config);
